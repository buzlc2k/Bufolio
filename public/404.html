<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BaDuc</title>
  <script>
    // GitHub Pages SPA redirect trick
    // When GitHub Pages returns 404, this page captures the full URL
    // and redirects to index.html with the path encoded as a query param.
    var pathSegmentsToKeep = 1; // Number of path segments for the repo basename (e.g. /Bufolio)

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
